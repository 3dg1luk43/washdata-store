<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WashData Store documentation - how to browse, contribute, and adopt appliance profiles.">
  <title>Docs - WashData Store</title>
  <link rel="icon" type="image/png" href="img/icon.png">
  <link rel="apple-touch-icon" href="img/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .docs-wrap {
      max-width: 800px;
      margin: 0 auto;
    }
    .docs-toolbar {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .docs-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 2.5rem;
      position: relative;
    }
    .docs-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .35;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    @media (max-width: 640px) {
      .docs-card { padding: 1.25rem 1.25rem; }
    }

    /* Rendered markdown */
    .docs-content { line-height: 1.7; }
    .docs-content h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.4rem, 3vw, 1.875rem);
      font-weight: 700;
      color: var(--text);
      margin: 0 0 1.25rem;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }
    .docs-content h2 {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text);
      margin: 2.25rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-subtle);
      line-height: 1.3;
    }
    .docs-content h2:first-of-type { margin-top: 1.5rem; }
    .docs-content h3 {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin: 1.625rem 0 0.5rem;
    }
    .docs-content h4 {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 1.25rem 0 0.4rem;
    }
    .docs-content p {
      margin: 0 0 1rem;
      color: var(--text);
    }
    .docs-content ul {
      list-style: disc;
      padding-left: 1.5rem;
      margin: 0 0 1rem;
    }
    .docs-content ol {
      list-style: decimal;
      padding-left: 1.5rem;
      margin: 0 0 1rem;
    }
    .docs-content li {
      margin-bottom: 0.375rem;
      color: var(--text);
    }
    .docs-content li > p { margin-bottom: 0.25rem; }
    .docs-content code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      color: var(--accent);
    }
    .docs-content pre {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 0 0 1rem;
    }
    .docs-content pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 0.8125rem;
    }
    .docs-content a { color: var(--accent); text-decoration: none; }
    .docs-content a:hover { color: var(--accent-hover); text-decoration: underline; }
    .docs-content strong { font-weight: 600; }
    .docs-content em { font-style: italic; }
    .docs-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 0 0 1rem;
      background: var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .docs-content blockquote p { margin: 0; color: var(--text-muted); }
    .docs-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    .docs-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 1.25rem;
      font-size: 0.875rem;
    }
    .docs-content table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .docs-content table td {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      color: var(--text);
      vertical-align: top;
    }
    .docs-content table tbody tr:hover td { background: var(--bg-surface); }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="brand">
      <svg width="34" height="20" viewBox="0 0 36 22" fill="none" aria-hidden="true">
        <polyline points="0,18 2,18 2,10 5,10 7,14 9,8 11,14 13,10 15,10 15,4 17,4 19,10 21,4 23,4 25,10 27,18 36,18"
          stroke="var(--accent)" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      WashData Store
    </a>
    <nav aria-label="Main navigation">
      <a class="nav-link" href="index.html">Browse</a>
      <a class="nav-link active" href="docs.html">Docs</a>
    </nav>
  </header>

  <main>
    <div class="docs-wrap">
      <div class="docs-toolbar">
        <a class="btn btn-ghost btn-sm" href="index.html">&#8592; Back to Store</a>
        <a class="btn btn-ghost btn-sm"
           href="https://github.com/3dg1luk43/washdata_store/blob/main/README.md"
           target="_blank" rel="noopener">View on GitHub</a>
      </div>

      <div class="docs-card">
        <div id="docs-loading" class="loading-center">
          <div class="loading-spinner"></div>
          <span>Loading documentation...</span>
        </div>

        <div id="docs-error" class="empty-state" hidden>
          <div class="empty-icon">&#9888;</div>
          <div class="empty-title">Could not load documentation</div>
          <div class="empty-text" id="docs-error-text">
            Unable to fetch the README from GitHub. Check your connection and try again.
          </div>
          <a class="btn btn-ghost btn-sm mt-1"
             href="https://github.com/3dg1luk43/washdata_store/blob/main/README.md"
             target="_blank" rel="noopener">View on GitHub instead</a>
        </div>

        <div id="docs-content" class="docs-content" hidden></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <span>Idea by <a href="https://github.com/oli-z" target="_blank" rel="noopener">oli-z</a></span>
    <span class="foot-sep">&middot;</span>
    <span>Developed by <a href="https://github.com/3dg1luk43" target="_blank" rel="noopener">3dg1luk43</a></span>
    <span class="foot-sep">&middot;</span>
    <span>Copyright &copy; 2026</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function () {
      const README_URL =
        'https://raw.githubusercontent.com/3dg1luk43/washdata_store/main/README.md';

      const elLoading = document.getElementById('docs-loading');
      const elError   = document.getElementById('docs-error');
      const elContent = document.getElementById('docs-content');
      const elErrText = document.getElementById('docs-error-text');

      try {
        const res = await fetch(README_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const md = await res.text();
        elContent.innerHTML = marked.parse(md);
        elLoading.hidden = true;
        elContent.hidden = false;
      } catch (err) {
        elLoading.hidden = true;
        elErrText.textContent =
          'Unable to fetch the README from GitHub (' + err.message +
          '). Check your connection or view it on GitHub directly.';
        elError.hidden = false;
      }
    })();
  </script>
</body>
</html>
